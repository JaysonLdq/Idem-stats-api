networks:
  traefik:
    external: true
  internal:

services:
  # ── dev / http (profile "nossl") ────────────────────────────────────
  api-nossl:
    profiles: [ "nossl" ]
    image: node:20-alpine
    container_name: "${WEBSITE_NAME}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://idem:idem@db:5432/idem?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-30d}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-10}"
      PORT: "3000"
      NODE_ENV: "development"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    volumes:
      - .:/app
    working_dir: /app
    command: /bin/sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${WEBSITE_NAME}.rule=Host(`${DOMAIN_WEBSITE}`)"
      - "traefik.http.routers.${WEBSITE_NAME}.entrypoints=${ENTRYPOINT}"
      - "traefik.http.services.${WEBSITE_NAME}.loadbalancer.server.port=3000"
    networks:
      - traefik
      - internal

  # ── prod / https (profile "ssl") ────────────────────────────────────
  api:
    profiles: [ "ssl" ]
    image: node:20-alpine
    container_name: "${WEBSITE_NAME}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://idem:idem@db:5432/idem?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-30d}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-10}"
      PORT: "3000"
      NODE_ENV: "production"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    volumes:
      - .:/app
    working_dir: /app
    command: /bin/sh -c "apk add --no-cache openssl && npm install --omit=dev && npx prisma generate && npx prisma migrate deploy && npm start"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${WEBSITE_NAME}.rule=Host(`${DOMAIN_WEBSITE}`)"
      - "traefik.http.routers.${WEBSITE_NAME}.entrypoints=${ENTRYPOINT}"
      - "traefik.http.services.${WEBSITE_NAME}.loadbalancer.server.port=3000"
      - "traefik.http.routers.${WEBSITE_NAME}.tls.certresolver=myhttpchallenge"
    networks:
      - traefik
      - internal

  # ── Postgres : interne uniquement, jamais exposé à Traefik ──────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: idem
      POSTGRES_PASSWORD: idem
      POSTGRES_DB: idem
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idem"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  dbdata: {}
